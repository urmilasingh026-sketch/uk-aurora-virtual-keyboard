    <style>

      #music-mode-toggle-dock {

  <body>
    <div id="root"></div>
    <button id="music-mode-toggle-float" title="Exit Music Mode" aria-label="Exit full-screen keyboard">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
    </button>
    <script>
      (function () {
        var MUSIC_MODE_CLASS = "music-mode";
        var tagged = false;
        var MUSIC_SVG =
          '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>';

        function tagElements() {
          if (tagged) return true;
          var topBar = document.querySelector(".top-bar");
          var typingRow = document.querySelector("main > div.flex-1.min-h-0");
          var main = document.querySelector("main");
          var keyboardFrame = document.querySelector(".keyboard-frame");
          var keyboardWrap = keyboardFrame
            ? keyboardFrame.parentElement && keyboardFrame.parentElement.parentElement
            : null;
          var settingsBtn = document.querySelector('button[title="Open Settings"]');

          if (!topBar || !typingRow || !main || !keyboardWrap || !settingsBtn) return false;

          topBar.classList.add("ka-topbar");
          typingRow.classList.add("ka-typingrow");
          main.classList.add("ka-main");
          keyboardWrap.classList.add("ka-keyboardwrap");

          // Insert the real toggle button right next to Settings, inside the app's own toolbar
          if (!document.getElementById("music-mode-toggle-dock")) {
            var dockBtn = document.createElement("button");
            dockBtn.id = "music-mode-toggle-dock";
            dockBtn.title = "Toggle full-screen keyboard (Music Mode)";
            dockBtn.setAttribute("aria-label", "Toggle full-screen keyboard");
            dockBtn.innerHTML = MUSIC_SVG;
            dockBtn.addEventListener("click", toggleMusicMode);
            settingsBtn.parentNode.insertBefore(dockBtn, settingsBtn);
          }

          tagged = true;
          return true;
        }

        function clickByText(selector, text) {
          var els = document.querySelectorAll(selector);
          for (var i = 0; i < els.length; i++) {
            if (els[i].textContent && els[i].textContent.trim().indexOf(text) !== -1) {
              els[i].click();
              return true;
            }
          }
          return false;
        }

        // Notes played while the typing panel was hidden shouldn't leave the
        // typing test in a messed-up state (wrong progress/errors) once it's
        // shown again. We clear it via the app's own "Reset Session" control.
        function resetTypingSession() {
          var settingsBtn = document.querySelector('button[title="Open Settings"]');
          if (!settingsBtn) return;
          var wasOpen = document.querySelector(".settings-drawer");
          var alreadyOpen = wasOpen && wasOpen.style.transform && wasOpen.style.transform.indexOf("translateX(0") === 0;

          settingsBtn.click();
          setTimeout(function () {
            clickByText("button", "Typing");
            setTimeout(function () {
              clickByText("button", "Reset Session");
              setTimeout(function () {
                if (!alreadyOpen) settingsBtn.click();
              }, 120);
            }, 120);
          }, 120);
        }

        function setMusicMode(on) {
          document.body.classList.toggle(MUSIC_MODE_CLASS, on);
          try {
            localStorage.setItem("ukAuroraMusicMode", on ? "1" : "0");
          } catch (e) {}
          // Let the app recompute any size-dependent layout (keyboard auto-scale, etc.)
          window.dispatchEvent(new Event("resize"));
          if (!on) resetTypingSession();
        }

        function toggleMusicMode() {
          if (!tagElements()) return;
          var isOn = document.body.classList.contains(MUSIC_MODE_CLASS);
          setMusicMode(!isOn);
        }

        document.addEventListener("DOMContentLoaded", function () {
          var floatBtn = document.getElementById("music-mode-toggle-float");
          if (floatBtn) floatBtn.addEventListener("click", toggleMusicMode);

          // Retry tagging for a bit since the app renders asynchronously
          var attempts = 0;
          var interval = setInterval(function () {
            attempts++;
            if (tagElements() || attempts > 40) clearInterval(interval);
          }, 250);
        });
      })();
    </script>
